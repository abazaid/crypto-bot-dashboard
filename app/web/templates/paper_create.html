{% extends "base.html" %}
{% block content %}
<section class="paper-layout">
  <aside class="paper-sidebar card">
    <h3>Paper Menu</h3>
    <a class="side-link" href="/paper">Campaigns Home</a>
    <a class="side-link active" href="/paper/create">Create Campaign</a>
  </aside>

  <div class="paper-main">
    <section class="hero">
      <h1>Create Campaign</h1>
      <p>This page has no auto refresh, so you can edit comfortably.</p>
    </section>

    <section class="card">
      <h2>New Campaign</h2>
      <form method="post" action="/paper/campaigns" class="form-grid">
        <label>Campaign Name
          <input name="name" required placeholder="Example: Dip Hunter 1">
        </label>
        <label>Entry Amount / Coin (USDT)
          <input name="entry_amount_usdt" type="number" step="0.01" min="1" required placeholder="100">
        </label>
        <label>Take Profit % (Optional)
          <input name="tp_pct" type="number" step="0.01" min="0" placeholder="3.5">
        </label>
        <label>Stop Loss % (Optional)
          <input name="sl_pct" type="number" step="0.01" min="0" placeholder="5">
        </label>
        <label>AI DCA Mode
          <span class="inline-check">
            <input id="ai_dca_enabled" name="ai_dca_enabled" type="checkbox">
            <span>Enable Auto DCA from support levels</span>
          </span>
        </label>
        <label>Trend Filter (BTC)
          <span class="inline-check">
            <input id="trend_filter_enabled" name="trend_filter_enabled" type="checkbox">
            <span>If BTC is bearish: reduce DCA size. If strongly bearish: stop DCA buys.</span>
          </span>
        </label>
        <label>Auto Re-entry
          <span class="inline-check">
            <input id="auto_reentry_enabled" name="auto_reentry_enabled" type="checkbox">
            <span>After a symbol closes, reopen it automatically while campaign is active.</span>
          </span>
        </label>

        <label>DCA-1 Drop %
          <input class="manual-dca" name="dca_drop_1" type="number" step="0.01" min="0" placeholder="2">
        </label>
        <label>DCA-1 Allocation % of Entry
          <input class="manual-dca" name="dca_alloc_1" type="number" step="0.01" min="0" placeholder="50">
        </label>
        <label>DCA-2 Drop %
          <input class="manual-dca" name="dca_drop_2" type="number" step="0.01" min="0" placeholder="4">
        </label>
        <label>DCA-2 Allocation % of Entry
          <input class="manual-dca" name="dca_alloc_2" type="number" step="0.01" min="0" placeholder="50">
        </label>
        <label>DCA-3 Drop %
          <input class="manual-dca" name="dca_drop_3" type="number" step="0.01" min="0" placeholder="7">
        </label>
        <label>DCA-3 Allocation % of Entry
          <input class="manual-dca" name="dca_alloc_3" type="number" step="0.01" min="0" placeholder="100">
        </label>

        <div class="full">
          <label>Search Binance Symbols</label>
          <div class="symbol-search">
            <input id="symbol-query" type="text" placeholder="Search e.g. BTC, ETH, SOL...">
            <button type="button" id="symbol-search-btn">Search</button>
            <button type="button" id="suggest-top5-btn">Suggest Top 5</button>
          </div>
          <p id="suggest-meta" class="muted-line"></p>
          <div id="suggestions-board" class="chips"></div>
          <div id="symbol-results" class="chips"></div>
          <label>Selected Symbols (CSV)</label>
          <textarea id="symbols" name="symbols" required placeholder="BTCUSDT,ETHUSDT" rows="3"></textarea>
        </div>

        <div class="full">
          <button type="submit">Start Campaign (Buy Now)</button>
        </div>
      </form>
    </section>

    <section class="card danger-card">
      <h2>Reset Paper</h2>
      <p>This will delete all paper campaigns, positions, logs, and restore starting capital.</p>
      <form method="post" action="/paper/reset" onsubmit="return confirm('Are you sure? This will delete all paper data.');" class="form-grid">
        <label>Type RESET to confirm
          <input name="confirm_text" placeholder="RESET" required>
        </label>
        <div class="full">
          <button type="submit" class="sell-btn">Reset</button>
        </div>
      </form>
    </section>
  </div>
</section>

<script>
  const queryInput = document.getElementById("symbol-query");
  const resultBox = document.getElementById("symbol-results");
  const symbolsInput = document.getElementById("symbols");
  const searchButton = document.getElementById("symbol-search-btn");
  const suggestButton = document.getElementById("suggest-top5-btn");
  const suggestMeta = document.getElementById("suggest-meta");
  const suggestionsBoard = document.getElementById("suggestions-board");
  const aiDcaToggle = document.getElementById("ai_dca_enabled");
  const manualDcaFields = document.querySelectorAll(".manual-dca");

  function appendSymbol(symbol) {
    const current = symbolsInput.value.split(",").map(v => v.trim()).filter(Boolean);
    if (!current.includes(symbol)) {
      current.push(symbol);
    }
    symbolsInput.value = current.join(",");
  }

  async function searchSymbols() {
    const q = encodeURIComponent(queryInput.value || "");
    const res = await fetch(`/api/binance/symbols?q=${q}`);
    const data = await res.json();
    resultBox.innerHTML = "";
    data.items.forEach(symbol => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "chip";
      btn.textContent = symbol;
      btn.onclick = () => appendSymbol(symbol);
      resultBox.appendChild(btn);
    });
  }

  function setSymbols(symbols) {
    symbolsInput.value = symbols.join(",");
  }

  async function suggestTop5() {
    suggestMeta.textContent = "Scanning market...";
    suggestionsBoard.innerHTML = "";
    const res = await fetch(`/api/paper/suggestions?limit=5`);
    const data = await res.json();
    const items = data.items || [];
    if (!items.length) {
      suggestMeta.textContent = `No strong suggestions now. BTC state: ${data.market_state || 'unknown'}`;
      return;
    }
    suggestMeta.textContent = `BTC trend state: ${data.market_state}. Click any symbol to add it.`;
    items.forEach((item) => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "chip";
      btn.textContent = `${item.symbol} | score ${item.score}`;
      btn.onclick = () => appendSymbol(item.symbol);
      suggestionsBoard.appendChild(btn);
    });
    setSymbols(items.map(i => i.symbol));
  }

  function syncDcaMode() {
    const disabled = aiDcaToggle.checked;
    manualDcaFields.forEach((field) => {
      field.disabled = disabled;
      if (disabled) {
        field.value = "";
      }
    });
  }

  searchButton.addEventListener("click", searchSymbols);
  suggestButton.addEventListener("click", suggestTop5);
  aiDcaToggle.addEventListener("change", syncDcaMode);
  queryInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      e.preventDefault();
      searchSymbols();
    }
  });
  syncDcaMode();
</script>
{% endblock %}
