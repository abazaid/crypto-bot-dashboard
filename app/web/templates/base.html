<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Crypto Bots Rebuild</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="wrap topbar-inner">
      <a class="brand" href="/">Crypto Bots v2</a>
      <nav class="nav">
        <a class="{% if active_page == 'paper' %}active{% endif %}" href="/paper">Paper Trading</a>
        <a class="{% if active_page == 'live' %}active{% endif %}" href="/live">Live Mode</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    {% block content %}{% endblock %}
  </main>

  <footer class="wrap footer">
    <small>Last update: {{ now }}</small>
  </footer>
</body>
</html>
